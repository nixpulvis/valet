[package]
name = "valet"
version = "0.0.2"
edition = "2024"
default-run = "valet"
license = "MIT"
documentation = "https://nixpulvis.com/valet/valet"
repository = "https://github.com/nixpulvis/valet"
authors = ["Nathan Lilienthal <nathan@nixpulvis.com>"]
description = """
Valet is a password management framework and manager CLI/GUI application.
"""

[package.metadata.bundle.bin.gui]
name = "Valet"

[[bin]]
name = "gui"
required-features = ["gui"]

[[bin]]
name = "valet"
path = "src/bin/cli.rs"

[features]
orm = []
gui = ["dep:eframe", "dep:egui_inbox"]

[dependencies]
aes-gcm-siv = "0.11"
argon2 = "0.5"
# bitcode = "0.6.6"
bitcode = { git = "https://github.com/nixpulvis/bitcode", branch = 'pin-support' }
csv = "1.3"
rand_core = "0.6"
regex = "1.12"
rpassword = "7.4"
sea-orm = { version = "2.0.0-rc.37", features = ["sqlx-sqlite", "runtime-tokio-rustls"] }
serde = { version = "1.0", features = ["derive"] }
snap = "1.1.1"
sqlx = { version = "0.8", features = ["sqlite", "runtime-tokio"] }
tokio = { version = "1.46", features = ["full"] }
url = "2.5"
uuid = { version = "1.17", features = ["v7"] }
zeroize = { version = "1.8", features = ["derive"] }

# CLI Dependencies
clap = { version = "4.5", features = ["derive", "cargo"] }
clap-repl = { version = "0.3", features = ["async"] }
clap_complete = "4.5"

# GUI Dependencies
eframe = { version = "0.32", optional = true }
egui_inbox = { version = "0.9", optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }

[[bench]]
name = "encrypt"
harness = false
[[bench]]
name = "record"
harness = false
