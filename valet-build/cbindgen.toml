language = "C"
header = "/* Generated by cbindgen. Do not edit by hand. */"
pragma_once = true
autogen_warning = "/* WARNING: this file is autogenerated. */"
cpp_compat = true
sys_includes = ["stddef.h", "stdint.h"]
no_includes = true

[export]
item_types = ["enums", "structs", "opaque", "typedefs", "functions", "constants"]

[parse]
parse_deps = false
